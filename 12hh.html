<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>

    <h1>Сериал "Основание Осман"</h1>

    <!-- Баннер (партнёрская ссылка на казино) -->

    <!-- Видеоплеер -->

        <iframe id="videoPlayer" width="100%" height="400px" src="https://ok.ru/videoembed/10168015129169" frameborder="0" allowfullscreen></iframe>
    </div>

    <!-- Кнопки переключения серий -->

    <!-- Баннер (реклама заработка) -->

        </a>

    <script>
        function changeEpisode(episode) {
            let videoLinks = {
                1: "https://ok.ru/videoembed/10168015129169",
